<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Muhasebeci Paneli</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f0f4f8;--sidebar:#1a2e4a;--sidebar-hover:#243d5e;--active:#2d6a4f;
  --accent:#2d6a4f;--accent-light:#52b788;--text:#1e293b;--muted:#64748b;
  --border:#e2e8f0;--white:#fff;--danger:#e53e3e;--warn:#d97706;
  --shadow:0 1px 3px rgba(0,0,0,.08);
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* HEADER */
header{background:var(--sidebar);color:#fff;padding:0 20px;height:52px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
header h1{font-size:15px;font-weight:600}
header span{font-size:12px;opacity:.7}

/* LAYOUT */
.layout{display:flex;flex:1;overflow:hidden}

/* SIDEBAR */
aside{width:240px;background:var(--sidebar);color:#fff;display:flex;flex-direction:column;flex-shrink:0}
.sidebar-section{padding:14px 12px 6px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;opacity:.5}
.sidebar-search{margin:0 10px 8px}
.sidebar-search input{width:100%;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);border-radius:6px;padding:6px 10px;color:#fff;font-size:12px;outline:none}
.sidebar-search input::placeholder{color:rgba(255,255,255,.4)}
.client-list{flex:1;overflow-y:auto;padding:0 6px 12px}
.client-item{display:flex;align-items:center;padding:8px 10px;border-radius:7px;cursor:pointer;gap:9px;margin-bottom:2px;transition:background .15s}
.client-item:hover{background:var(--sidebar-hover)}
.client-item.active{background:var(--active)}
.client-avatar{width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.client-info{flex:1;min-width:0}
.client-name{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.client-meta{font-size:10px;opacity:.55;margin-top:1px}
.client-badge{background:var(--accent-light);color:#fff;font-size:10px;font-weight:700;padding:2px 6px;border-radius:10px}

/* MAIN */
main{flex:1;overflow-y:auto;padding:20px}

/* EMPTY */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;opacity:.4;gap:10px;text-align:center}
.empty .icon{font-size:44px}

/* CLIENT HEADER */
.client-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px}
.client-header h2{font-size:18px;font-weight:700}
.client-header p{font-size:12px;color:var(--muted);margin-top:2px}
.controls{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
select,input[type=month]{border:1px solid var(--border);border-radius:6px;padding:6px 10px;font-size:12px;background:#fff;color:var(--text);outline:none}
.btn{padding:7px 14px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;border:none;display:inline-flex;align-items:center;gap:5px;transition:opacity .15s}
.btn:hover{opacity:.85}
.btn-primary{background:var(--accent);color:#fff}
.btn-outline{background:#fff;color:var(--accent);border:1px solid var(--accent)}
.btn-danger{background:var(--danger);color:#fff}
.btn-sm{padding:4px 10px;font-size:11px}

/* STATS */
.stats-row{display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.stat-card{background:#fff;border-radius:8px;padding:12px 16px;flex:1;min-width:100px;box-shadow:var(--shadow)}
.stat-card .label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.stat-card .value{font-size:20px;font-weight:700}
.stat-card .value.money{color:var(--accent)}

/* FILTERS */
.filters{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.filter-btn{padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:#fff;font-size:11px;cursor:pointer;transition:all .15s}
.filter-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}

/* SPLIT VIEW */
.split-view{display:flex;gap:16px;align-items:flex-start}
.table-area{flex:1;min-width:0}
.preview-panel{width:320px;flex-shrink:0;position:sticky;top:0}
.preview-card{background:#fff;border-radius:10px;box-shadow:var(--shadow);overflow:hidden}
.preview-card .preview-header{padding:12px 14px;border-bottom:1px solid var(--border);font-size:13px;font-weight:600;display:flex;justify-content:space-between;align-items:center}
.preview-card img{width:100%;display:block;cursor:zoom-in}
.preview-card .preview-empty{padding:40px;text-align:center;color:var(--muted);font-size:13px}
.preview-info{padding:12px 14px}
.preview-info .row{display:flex;justify-content:space-between;font-size:12px;margin-bottom:6px}
.preview-info .row .label{color:var(--muted)}
.preview-info .row .val{font-weight:600;text-align:right}
.preview-actions{padding:10px 14px;border-top:1px solid var(--border);display:flex;gap:8px}

/* TABLE */
.table-wrap{background:#fff;border-radius:10px;box-shadow:var(--shadow);overflow:hidden}
table{width:100%;border-collapse:collapse;font-size:12px}
thead{background:#f8fafc}
th{text-align:left;padding:10px 12px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);border-bottom:1px solid var(--border)}
td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#f8fafc}
tr.selected td{background:#f0fdf4}
tr.approved td{opacity:.7}

/* BADGES */
.badge{display:inline-block;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:600}
.badge-alis_fatura{background:#dbeafe;color:#1d4ed8}
.badge-satis_fatura{background:#fce7f3;color:#be185d}
.badge-alis_fis{background:#fef9c3;color:#92400e}
.badge-satis_fis{background:#ede9fe;color:#6d28d9}
.badge-approved{background:#dcfce7;color:#166534}
.badge-pending{background:#fef9c3;color:#92400e}

/* COMPANY GROUP */
.company-group{margin-bottom:20px}
.company-header{display:flex;align-items:center;gap:8px;padding:8px 12px;background:#f1f5f9;border-radius:8px;margin-bottom:8px;cursor:pointer}
.company-header h3{font-size:13px;font-weight:600;flex:1}
.company-toggle{font-size:12px;color:var(--muted)}

/* THUMBNAIL */
.img-thumb{width:32px;height:32px;border-radius:4px;object-fit:cover;cursor:pointer;border:1px solid var(--border)}
.no-img{width:32px;height:32px;background:var(--bg);border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:14px}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:1000;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:12px;padding:24px;width:420px;max-width:90vw}
.modal h3{font-size:16px;font-weight:700;margin-bottom:16px}
.modal .field{margin-bottom:12px}
.modal label{display:block;font-size:12px;color:var(--muted);margin-bottom:4px}
.modal input,.modal select{width:100%;border:1px solid var(--border);border-radius:6px;padding:8px 10px;font-size:13px;outline:none}
.modal input:focus,.modal select:focus{border-color:var(--accent)}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}

/* LIGHTBOX */
.lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:2000;align-items:center;justify-content:center}
.lightbox.open{display:flex}
.lightbox img{max-width:92vw;max-height:92vh;border-radius:6px}
.lightbox-close{position:absolute;top:16px;right:20px;color:#fff;font-size:28px;cursor:pointer;opacity:.8}
.lightbox-close:hover{opacity:1}

.loader{text-align:center;padding:40px;color:var(--muted)}
.money-val{font-weight:600;color:var(--accent);text-align:right}
.total-row td{font-weight:700;background:#f0fdf4}
</style>
</head>
<body>
<header>
  <h1>📊 Muhasebeci Paneli</h1>
  <span id="accountant-name">Yükleniyor...</span>
</header>
<div class="layout">
  <aside>
    <div class="sidebar-section">Mükellefler</div>
    <div class="sidebar-search"><input id="search-input" placeholder="Ara..." oninput="filterClients()"></div>
    <div class="client-list" id="client-list"><div class="loader">Yükleniyor...</div></div>
  </aside>
  <main id="main-content">
    <div class="empty"><div class="icon">📂</div><p>Sol taraftan mükellef seçin</p></div>
  </main>
</div>

<!-- Edit Modal -->
<div class="modal-overlay" id="edit-modal">
  <div class="modal">
    <h3>✏️ Belge Düzenle</h3>
    <div class="field"><label>Firma Adı</label><input id="edit-firma" type="text"></div>
    <div class="field"><label>Tarih</label><input id="edit-tarih" type="text" placeholder="GG.AA.YYYY"></div>
    <div class="field"><label>Fatura No</label><input id="edit-fatura-no" type="text"></div>
    <div class="field"><label>KDV'li Toplam ₺</label><input id="edit-toplam" type="number" step="0.01"></div>
    <div class="field"><label>KDV'siz Toplam ₺</label><input id="edit-kdvsiz" type="number" step="0.01"></div>
    <div class="field"><label>KDV ₺</label><input id="edit-kdv" type="number" step="0.01"></div>
    <div class="field"><label>Ödeme</label>
      <select id="edit-odeme">
        <option>Nakit</option><option>Kredi Kartı</option><option>Havale</option><option>Açık Hesap</option>
      </select>
    </div>
    <div class="field"><label>Not</label><input id="edit-notlar" type="text"></div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeEdit()">İptal</button>
      <button class="btn btn-primary" onclick="saveEdit()">💾 Kaydet</button>
    </div>
  </div>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <span class="lightbox-close">✕</span>
  <img id="lightbox-img" src="" alt="">
</div>

<script>
const params = new URLSearchParams(location.search);
const TOKEN = params.get('token');
if (!TOKEN) document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;font-size:16px;color:#e53e3e">❌ Token bulunamadı. /panel komutunu kullanın.</div>';

let allClients = [], selectedClientId = null, selectedClientName = '', currentDocs = [];
let editDocId = null, previewDocId = null;
let activeDocType = 'all', activeMonth = '';

async function api(path, opts = {}) {
  const url = new URL('/api' + path, location.origin);
  url.searchParams.set('token', TOKEN);
  const res = await fetch(url, opts);
  if (!res.ok) { const e = await res.json().catch(()=>({})); throw new Error(e.detail||'Hata'); }
  return res.json();
}

async function apiDelete(path) {
  const url = new URL('/api' + path, location.origin);
  url.searchParams.set('token', TOKEN);
  const res = await fetch(url, {method:'DELETE'});
  if (!res.ok) throw new Error('Silinemedi');
  return res.json();
}

async function apiPatch(path, body) {
  const url = new URL('/api' + path, location.origin);
  url.searchParams.set('token', TOKEN);
  const res = await fetch(url, {method:'PATCH', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body)});
  if (!res.ok) throw new Error('Güncellenemedi');
  return res.json();
}

async function init() {
  try {
    const me = await api('/me');
    document.getElementById('accountant-name').textContent = me.full_name;
    await loadClients();
  } catch(e) {
    document.body.innerHTML = `<div style="display:flex;align-items:center;justify-content:center;height:100vh;font-size:14px;color:#e53e3e">❌ ${e.message}</div>`;
  }
}

async function loadClients() {
  allClients = await api('/clients');
  renderClients(allClients);
}

function renderClients(clients) {
  const el = document.getElementById('client-list');
  if (!clients.length) { el.innerHTML = '<div style="padding:16px;font-size:12px;opacity:.5;text-align:center">Mükellef yok</div>'; return; }
  el.innerHTML = clients.map(c => {
    const name = c.full_name || 'İsimsiz';
    const last = c.last_activity ? c.last_activity.slice(0,10) : '—';
    return `<div class="client-item ${c.id===selectedClientId?'active':''}" onclick="selectClient(${c.id},'${esc(name)}',${c.doc_count})">
      <div class="client-avatar">${name[0].toUpperCase()}</div>
      <div class="client-info"><div class="client-name">${esc(name)}</div><div class="client-meta">Son: ${last}</div></div>
      ${c.doc_count>0?`<span class="client-badge">${c.doc_count}</span>`:''}
    </div>`;
  }).join('');
}

function filterClients() {
  const q = document.getElementById('search-input').value.toLowerCase();
  renderClients(allClients.filter(c=>(c.full_name||'').toLowerCase().includes(q)));
}

function selectClient(id, name, count) {
  selectedClientId = id; selectedClientName = name;
  renderClients(allClients.filter(c=>{
    const q = document.getElementById('search-input').value.toLowerCase();
    return (c.full_name||'').toLowerCase().includes(q);
  }));
  renderClientView(id, name, count);
}

function renderClientView(id, name, count) {
  const now = new Date();
  activeMonth = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  activeDocType = 'all';
  document.getElementById('main-content').innerHTML = `
    <div class="client-header">
      <div><h2>${esc(name)}</h2><p>${count} belge kayıtlı</p></div>
      <div class="controls">
        <input type="month" id="month-filter" value="${activeMonth}" onchange="onMonthChange()">
        <button class="btn btn-outline btn-sm" onclick="clearMonth()">Tümü</button>
        <button class="btn btn-primary btn-sm" onclick="exportExcel()">⬇ Excel</button>
        <button class="btn btn-outline btn-sm" onclick="exportPDF()">📄 PDF</button>
      </div>
    </div>
    <div class="stats-row" id="stats-row">
      <div class="stat-card"><div class="label">Belge</div><div class="value" id="stat-count">—</div></div>
      <div class="stat-card"><div class="label">Alış Toplamı</div><div class="value money" id="stat-alis">—</div></div>
      <div class="stat-card"><div class="label">Satış Toplamı</div><div class="value money" id="stat-satis">—</div></div>
      <div class="stat-card"><div class="label">Onaylanan</div><div class="value" id="stat-approved">—</div></div>
    </div>
    <div class="filters" id="type-filters">
      <button class="filter-btn active" onclick="filterType('all',this)">Tümü</button>
      <button class="filter-btn" onclick="filterType('alis_fatura',this)">📥 Alış Fatura</button>
      <button class="filter-btn" onclick="filterType('alis_fis',this)">📥 Alış Fiş</button>
      <button class="filter-btn" onclick="filterType('satis_fatura',this)">📤 Satış Fatura</button>
      <button class="filter-btn" onclick="filterType('satis_fis',this)">📤 Satış Fiş</button>
    </div>
    <div class="split-view">
      <div class="table-area" id="table-area"><div class="loader">⏳ Yükleniyor...</div></div>
      <div class="preview-panel" id="preview-panel">
        <div class="preview-card">
          <div class="preview-header"><span>🖼 Önizleme</span></div>
          <div class="preview-empty">Satıra tıklayın</div>
        </div>
      </div>
    </div>`;
  loadDocs(id);
}

function onMonthChange() {
  activeMonth = document.getElementById('month-filter').value;
  loadDocs(selectedClientId);
}
function clearMonth() {
  activeMonth = '';
  const el = document.getElementById('month-filter');
  if (el) el.value = '';
  loadDocs(selectedClientId);
}
function filterType(type, btn) {
  activeDocType = type;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderDocs();
}

async function loadDocs(clientId) {
  document.getElementById('table-area').innerHTML = '<div class="loader">⏳ Yükleniyor...</div>';
  try {
    const params = {client_id: clientId};
    if (activeMonth) params.month = activeMonth;
    const url = new URL('/api/documents', location.origin);
    url.searchParams.set('token', TOKEN);
    url.searchParams.set('client_id', clientId);
    if (activeMonth) url.searchParams.set('month', activeMonth);
    const res = await fetch(url);
    currentDocs = await res.json();
    renderDocs();
  } catch(e) {
    document.getElementById('table-area').innerHTML = `<div class="loader">❌ ${e.message}</div>`;
  }
}

function renderDocs() {
  const filtered = activeDocType === 'all' ? currentDocs : currentDocs.filter(d=>d.doc_type===activeDocType);

  // Stats
  let alisTotal=0, satisTotal=0, approved=0;
  filtered.forEach(d=>{
    const v = parseFloat(d.kdv_li_toplam||0);
    if ((d.doc_type||'').includes('alis')) alisTotal+=v;
    else satisTotal+=v;
    if (d.review_status==='approved') approved++;
  });
  document.getElementById('stat-count').textContent = filtered.length;
  document.getElementById('stat-alis').textContent = fmt(alisTotal);
  document.getElementById('stat-satis').textContent = fmt(satisTotal);
  document.getElementById('stat-approved').textContent = `${approved}/${filtered.length}`;

  if (!filtered.length) {
    document.getElementById('table-area').innerHTML = '<div class="loader">📭 Belge bulunamadı.</div>';
    return;
  }

  // Group by company
  const groups = {};
  filtered.forEach(d => {
    const co = d.firma_adi || 'Diğer';
    if (!groups[co]) groups[co] = [];
    groups[co].push(d);
  });

  let html = '';
  Object.entries(groups).forEach(([company, docs]) => {
    const coTotal = docs.reduce((s,d)=>s+parseFloat(d.kdv_li_toplam||0),0);
    html += `<div class="company-group">
      <div class="company-header" onclick="toggleGroup(this)">
        <h3>🏢 ${esc(company)}</h3>
        <span>${docs.length} belge — ${fmt(coTotal)}</span>
        <span class="company-toggle">▼</span>
      </div>
      <div class="company-body">
      <div class="table-wrap"><table>
        <thead><tr><th>#</th><th>Görsel</th><th>Tür</th><th>Tarih</th><th>Fatura No</th><th>Ödeme</th><th style="text-align:right">KDV'li Toplam</th><th>Durum</th><th>İşlem</th></tr></thead>
        <tbody>`;
    docs.forEach((d,i) => {
      const badge = docBadge(d.doc_type);
      const statusBadge = d.review_status==='approved'
        ? '<span class="badge badge-approved">✅ Onaylı</span>'
        : '<span class="badge badge-pending">⏳ Bekliyor</span>';
      const imgCell = d.has_image
        ? `<img class="img-thumb" src="${d.image_url}" onclick="showPreview(${d.id},'${d.image_url}',${JSON.stringify(d).replace(/"/g,'&quot;')})" loading="lazy">`
        : `<div class="no-img">📄</div>`;
      const isSelected = d.id === previewDocId;
      html += `<tr class="${isSelected?'selected':''} ${d.review_status==='approved'?'approved':''}" id="row-${d.id}">
        <td>${i+1}</td>
        <td>${imgCell}</td>
        <td>${badge}</td>
        <td>${d.tarih||'—'}</td>
        <td>${esc(d.fatura_no||'—')}</td>
        <td>${esc(d.payment_type||'—')}</td>
        <td class="money-val">${d.kdv_li_toplam?fmt(d.kdv_li_toplam):'—'}</td>
        <td>${statusBadge}</td>
        <td>
          <div style="display:flex;gap:4px">
            <button class="btn btn-primary btn-sm" onclick="approveDoc(${d.id})" title="Onayla">✅</button>
            <button class="btn btn-outline btn-sm" onclick="openEdit(${d.id})" title="Düzenle">✏️</button>
            <button class="btn btn-danger btn-sm" onclick="deleteDoc(${d.id})" title="Sil">🗑</button>
          </div>
        </td>
      </tr>`;
    });
    const groupTotal = docs.reduce((s,d)=>s+parseFloat(d.kdv_li_toplam||0),0);
    html += `<tr class="total-row"><td colspan="6" style="text-align:right">TOPLAM</td><td class="money-val">${fmt(groupTotal)}</td><td colspan="2"></td></tr>`;
    html += '</tbody></table></div></div></div>';
  });

  document.getElementById('table-area').innerHTML = html;
}

function toggleGroup(header) {
  const body = header.nextElementSibling;
  const toggle = header.querySelector('.company-toggle');
  if (body.style.display === 'none') { body.style.display=''; toggle.textContent='▼'; }
  else { body.style.display='none'; toggle.textContent='▶'; }
}

function showPreview(docId, imgUrl, docData) {
  previewDocId = docId;
  document.querySelectorAll('tr[id^=row-]').forEach(r=>r.classList.remove('selected'));
  const row = document.getElementById(`row-${docId}`);
  if (row) row.classList.add('selected');

  const panel = document.getElementById('preview-panel');
  const d = typeof docData === 'string' ? JSON.parse(docData) : docData;
  panel.innerHTML = `<div class="preview-card">
    <div class="preview-header"><span>🖼 Önizleme</span><button class="btn btn-sm" onclick="openLightbox('${imgUrl}')">🔍 Büyüt</button></div>
    <img src="${imgUrl}" alt="Belge" onclick="openLightbox('${imgUrl}')">
    <div class="preview-info">
      <div class="row"><span class="label">Tür</span><span class="val">${esc(d.belge_tipi||d.doc_type||'—')}</span></div>
      <div class="row"><span class="label">Tarih</span><span class="val">${esc(d.tarih||'—')}</span></div>
      <div class="row"><span class="label">Firma</span><span class="val">${esc(d.firma_adi||'—')}</span></div>
      <div class="row"><span class="label">Fatura No</span><span class="val">${esc(d.fatura_no||'—')}</span></div>
      <div class="row"><span class="label">KDV'siz</span><span class="val">${d.kdvsiz_toplam?fmt(d.kdvsiz_toplam):'—'}</span></div>
      <div class="row"><span class="label">KDV</span><span class="val">${d.toplam_kdv?fmt(d.toplam_kdv):'—'}</span></div>
      <div class="row"><span class="label">KDV'li Toplam</span><span class="val" style="color:var(--accent)">${d.kdv_li_toplam?fmt(d.kdv_li_toplam):'—'}</span></div>
      <div class="row"><span class="label">Ödeme</span><span class="val">${esc(d.payment_type||'—')}</span></div>
    </div>
    <div class="preview-actions">
      <button class="btn btn-primary btn-sm" onclick="approveDoc(${docId})">✅ Onayla</button>
      <button class="btn btn-outline btn-sm" onclick="openEdit(${docId})">✏️ Düzelt</button>
      <button class="btn btn-danger btn-sm" onclick="deleteDoc(${docId})">🗑 Sil</button>
    </div>
  </div>`;
}

// ── APPROVE ───────────────────────────────────────────────────
async function approveDoc(docId) {
  try {
    await apiPatch(`/documents/${docId}/approve`, {});
    const doc = currentDocs.find(d=>d.id===docId);
    if (doc) doc.review_status = 'approved';
    renderDocs();
    if (previewDocId===docId) { const d=currentDocs.find(d=>d.id===docId); if(d&&d.image_url) showPreview(docId,d.image_url,d); }
  } catch(e) { alert('Hata: '+e.message); }
}

// ── EDIT ──────────────────────────────────────────────────────
function openEdit(docId) {
  editDocId = docId;
  const d = currentDocs.find(d=>d.id===docId);
  if (!d) return;
  document.getElementById('edit-firma').value = d.firma_adi||'';
  document.getElementById('edit-tarih').value = d.tarih||'';
  document.getElementById('edit-fatura-no').value = d.fatura_no||'';
  document.getElementById('edit-toplam').value = d.kdv_li_toplam||'';
  document.getElementById('edit-kdvsiz').value = d.kdvsiz_toplam||'';
  document.getElementById('edit-kdv').value = d.toplam_kdv||'';
  document.getElementById('edit-odeme').value = d.payment_type||'Nakit';
  document.getElementById('edit-notlar').value = d.notlar||'';
  document.getElementById('edit-modal').classList.add('open');
}
function closeEdit() { document.getElementById('edit-modal').classList.remove('open'); }
async function saveEdit() {
  const body = {
    firma_adi: document.getElementById('edit-firma').value||null,
    tarih: document.getElementById('edit-tarih').value||null,
    fatura_no: document.getElementById('edit-fatura-no').value||null,
    kdv_li_toplam: parseFloat(document.getElementById('edit-toplam').value)||null,
    kdvsiz_toplam: parseFloat(document.getElementById('edit-kdvsiz').value)||null,
    toplam_kdv: parseFloat(document.getElementById('edit-kdv').value)||null,
    payment_type: document.getElementById('edit-odeme').value,
    notlar: document.getElementById('edit-notlar').value||null,
  };
  try {
    await apiPatch(`/documents/${editDocId}/update`, body);
    const idx = currentDocs.findIndex(d=>d.id===editDocId);
    if (idx>=0) {
      if (body.firma_adi) currentDocs[idx].firma_adi = body.firma_adi;
      if (body.tarih) currentDocs[idx].tarih = body.tarih;
      if (body.fatura_no) currentDocs[idx].fatura_no = body.fatura_no;
      if (body.kdv_li_toplam) currentDocs[idx].kdv_li_toplam = body.kdv_li_toplam;
      if (body.kdvsiz_toplam) currentDocs[idx].kdvsiz_toplam = body.kdvsiz_toplam;
      if (body.toplam_kdv) currentDocs[idx].toplam_kdv = body.toplam_kdv;
      currentDocs[idx].payment_type = body.payment_type;
      currentDocs[idx].review_status = 'approved';
    }
    closeEdit();
    renderDocs();
  } catch(e) { alert('Hata: '+e.message); }
}

// ── DELETE ────────────────────────────────────────────────────
async function deleteDoc(docId) {
  if (!confirm('Bu belgeyi silmek istediğinize emin misiniz?')) return;
  try {
    await apiDelete(`/documents/${docId}`);
    currentDocs = currentDocs.filter(d=>d.id!==docId);
    if (previewDocId===docId) {
      previewDocId=null;
      document.getElementById('preview-panel').innerHTML=`<div class="preview-card"><div class="preview-header"><span>🖼 Önizleme</span></div><div class="preview-empty">Satıra tıklayın</div></div>`;
    }
    renderDocs();
  } catch(e) { alert('Hata: '+e.message); }
}

// ── EXPORT ────────────────────────────────────────────────────
function exportExcel() {
  const p = new URLSearchParams({token:TOKEN,client_id:selectedClientId});
  if (activeMonth) p.set('month',activeMonth);
  window.location.href = `/api/export/excel?${p}`;
}
function exportPDF() {
  const p = new URLSearchParams({token:TOKEN,client_id:selectedClientId});
  if (activeMonth) p.set('month',activeMonth);
  window.location.href = `/api/export/pdf?${p}`;
}

// ── LIGHTBOX ──────────────────────────────────────────────────
function openLightbox(url) { document.getElementById('lightbox-img').src=url; document.getElementById('lightbox').classList.add('open'); }
function closeLightbox() { document.getElementById('lightbox').classList.remove('open'); }
document.addEventListener('keydown',e=>{ if(e.key==='Escape'){ closeLightbox(); closeEdit(); } });

// ── HELPERS ───────────────────────────────────────────────────
function docBadge(type) {
  const map = { alis_fatura:'📥 Alış Fatura', satis_fatura:'📤 Satış Fatura', alis_fis:'📥 Alış Fiş', satis_fis:'📤 Satış Fiş' };
  return `<span class="badge badge-${type||'alis_fis'}">${map[type]||type||'—'}</span>`;
}
function fmt(v) { const n=parseFloat(v); if(isNaN(n)||n===0) return '—'; return '₺'+n.toLocaleString('tr-TR',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

init();
</script>
</body>
</html>
